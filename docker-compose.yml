services:
  app:
    build: .
    ports:
      - "3100:3000"
    env_file:
      - .env.local
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: ["npm", "run", "worker:ingest"]
    env_file:
      - .env.local
    environment:
      APP_URL: http://app:3000
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bonafied
      POSTGRES_USER: bonafied
      POSTGRES_PASSWORD: bonafied
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
